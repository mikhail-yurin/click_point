name: Release

on:
  push:
    tags:
      - 'v*'   # works for push like v1.0.0, v1.2.3 etc.

permissions:
  contents: write   # for uploading assets

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: click_point
            asset_name: click_point-linux-x86_64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: click_point
            asset_name: click_point-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: click_point
            asset_name: click_point-macos-aarch64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: click_point.exe
            asset_name: click_point-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true  # automatic decription generation from commits